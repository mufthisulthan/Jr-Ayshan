<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JR Marketing (Pvt) Ltd - POS, ERP, Stock Management & Invoicing Application. Login to your account.">
    <meta name="author" content="JR Marketing (Pvt) Ltd">
    <meta name="theme-color" content="#0a5c2e">

    <title>JR Marketing (Pvt) Ltd &mdash; Login</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

    <!-- LOGIN PAGE WRAPPER -->
    <main class="login-page" role="main" aria-label="Login Page">

        <!-- ===================== COMPONENT: Login Logo ===================== -->
        <div id="login-logo-placeholder">
            <div class="login-logo-area" role="banner">
                <div class="login-logo-circle" aria-label="JR Marketing (Pvt) Ltd Logo">
                    <img src="assets/images/logo.png" alt="JR Marketing (Pvt) Ltd Logo" class="login-logo-img-circle">
                </div>
                <h2 class="login-brand-name">JR Marketing (Pvt) Ltd</h2>
            </div>
        </div>

        <!-- ===================== COMPONENT: Login Card ===================== -->
        <div class="login-card" role="region" aria-label="Login Form">

            <div class="login-card-header">
                <h1 class="login-title">Welcome Back</h1>
                <p class="login-subtitle">Login to your JR Marketing (Pvt) Ltd</p>
            </div>

            <!-- Alert Box (hidden by default) -->
            <div id="login-alert" class="alert" style="display:none;" role="alert" aria-live="polite"></div>

            <form id="login-form" novalidate autocomplete="off">

                <!-- Username Field -->
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-icon-wrap">
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-control"
                            placeholder="Username"
                            autocomplete="username"
                            aria-required="true"
                            spellcheck="false"
                        >
                        <span class="input-icon" aria-hidden="true">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </span>
                    </div>
                    <span class="form-error-msg" id="username-error"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrap">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            placeholder="Password"
                            autocomplete="current-password"
                            aria-required="true"
                        >
                        <button type="button" class="password-toggle" id="toggle-password"
                                aria-label="Show password" title="Toggle password visibility">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <span class="form-error-msg" id="password-error"></span>
                </div>

                <!-- Forgot Password -->
                <div class="login-forgot-row">
                    <a href="forgot-password.html" class="login-forgot-link">Forgot Your Password?</a>
                </div>

                <!-- Remember Me -->
                <div class="login-remember-row">
                    <label class="checkbox-wrap">
                        <input type="checkbox" id="remember-me" name="remember-me">
                        <span class="checkbox-label">Remember Me</span>
                    </label>
                </div>

                <!-- Buttons -->
                <div class="login-btn-group">
                    <button type="submit" id="login-btn" class="btn btn-primary">
                        <span class="btn-text">Login</span>
                        <div class="spinner" aria-hidden="true"></div>
                    </button>
                </div>

            </form>
        </div>

        <!-- ===================== COMPONENT: Login Footer ===================== -->
        <footer id="login-footer-placeholder" class="login-footer" role="contentinfo">
            <p>JR Marketing (Pvt) Ltd &mdash; V6.3 &nbsp;|&nbsp; Copyright &copy; 2025 All rights reserved.</p>
            <p>Design and Developed by JR Marketing (Pvt) Ltd</p>
        </footer>

    </main>

    <!-- JS Dependencies -->
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/toast.js"></script>
    <script src="assets/js/login.js"></script>
</body>
</html>
